{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ action }} Department - Expense Tracker{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{{ action }} Department</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: space-between;">
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">{{ action }} Department</button>
                <a href="{% url 'department_list' %}" class="btn" style="background: var(--secondary-color); color: white;">Cancel</a>
            </div>
            {% if action == 'Edit' %}
            <a href="{% url 'department_delete' dept.id %}" class="btn" style="background: var(--danger); color: white;">Delete Department</a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
