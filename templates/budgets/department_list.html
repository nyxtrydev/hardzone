{% extends 'base.html' %}

{% block title %}Manage Departments - Expense Tracker{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>Departments</h2>
        <a href="{% url 'department_create' %}" class="btn btn-primary">Add Department</a>
    </div>

    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="border-bottom: 2px solid var(--border-color); text-align: left;">
                <th style="padding: 0.75rem;">Name</th>
                <th style="padding: 0.75rem;">Total Budget</th>
                <th style="padding: 0.75rem;">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for dept in departments %}
            <tr style="border-bottom: 1px solid var(--border-color);">
                <td style="padding: 0.75rem;">{{ dept.name }}</td>
                <td style="padding: 0.75rem;">₹{{ dept.total_budget }}</td>
                <td style="padding: 0.75rem;">
                    <a href="{% url 'department_edit' dept.id %}">Edit</a>
                    <a href="{% url 'department_delete' dept.id %}" class="btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
